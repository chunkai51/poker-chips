<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/poker-chip-icon.png" />
  <title>德州扑克筹码管理工具</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="top-bar" aria-label="房间同步">
    <div class="brand-lockup">
      <button class="brand-mark-button" type="button" aria-label="打开筹码动画">
        <img class="brand-mark" src="./assets/poker-chip-icon.png" alt="" aria-hidden="true" />
      </button>
      <span class="brand-name">Poker Chips</span>
    </div>
    <div class="room-controls">
      <label for="room-id">房间ID</label>
      <input type="text" id="room-id" placeholder="请输入房间号" />
      <button id="manual-sync" class="button button-ghost">同步</button>
      <span id="sync-status" class="sync-status">本地模式</span>
    </div>
  </header>

  <div class="main-content">
    <section id="setup" class="setup-panel" aria-labelledby="setup-title">
      <p class="eyebrow">Texas Hold'em Table</p>
      <h1 id="setup-title">德州扑克筹码管理工具</h1>
      <div id="player-names" class="player-inputs">
        <label for="initial-chips">初始筹码</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="initial-chips" min="100" value="1000" />
        <label for="big-blind">大盲注</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="big-blind" min="10" value="20" />
      </div>
      <div class="setup-actions">
        <button id="add-player" class="button button-secondary">添加玩家</button>
        <button id="start-game" class="button button-primary" disabled>开始游戏</button>
      </div>
      <div data-guide-mount="setup"></div>
    </section>
    <section id="game" class="game-table" style="display: none;" aria-labelledby="game-title">
      <div class="game-heading">
        <p class="eyebrow">Live Hand</p>
        <h2 id="game-title">游戏中</h2>
      </div>
      <div id="game-info" class="game-info" aria-live="polite">
        <p id="current-round" class="round-pill">当前轮次: 翻牌前</p>
        <p id="pot-amount" class="pot-display">奖池: 0</p>
      </div>
      <div id="deal-prompt-panel" class="deal-prompt-panel table-prompt-panel" hidden></div>
      <div id="hand-actions" class="hand-actions" hidden></div>
      <div id="showdown-panel" class="showdown-panel" hidden></div>
      <div id="settlement-preview-panel" class="settlement-preview-panel table-prompt-panel" hidden></div>
      <div id="player-boxes" class="player-boxes"></div>
      <details id="log-panel" class="log-panel">
        <summary id="log-summary">操作记录</summary>
        <div id="game-log" class="log-entries"></div>
      </details>
      <div data-guide-mount="game"></div>
    </section>
  </div>

  <div id="table-manager-backdrop" class="table-manager-backdrop" hidden>
    <section id="table-manager-panel" class="table-manager-panel" role="dialog" aria-modal="true" aria-labelledby="table-manager-title"></section>
  </div>

  <footer class="site-footer" aria-label="项目链接">
    <span>Made by Chunkai Chao</span>
    <nav class="site-footer-links" aria-label="更多链接">
      <a href="https://github.com/chunkai51/poker-chips" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://chunkai51.github.io/chunkai-blog/" target="_blank" rel="noopener noreferrer">Blog</a>
    </nav>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
