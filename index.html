<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>德州扑克筹码管理工具</title>
  <style>
    /* 页面背景绘制绿与深绿的棋盘格 */
    body {
      background-color: #004d00;
      background-image:
        linear-gradient(45deg, #006400 25%, transparent 25%),
        linear-gradient(-45deg, #006400 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #006400 75%),
        linear-gradient(-45deg, transparent 75%, #006400 75%);
      background-size: 100px 100px;
      background-position: 0 0, 0 50px, 50px -50px, -50px 0px;
      color: white;
    }
    
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    .player-inputs input {
      display: block;
      margin-bottom: 10px;
    }
    .player-info {
      margin-top: 20px;
    }
    .player-info div {
      margin-bottom: 10px;
    }
    .player-boxes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px; 
    }
    .player-box {
      border: 2px solid #ccc;
      padding: 10px;
      width: 200px;
      text-align: center;
      border-radius: 5px;
      background-color: #f0f8ff;
      color:black;
    }
    .player-box.active {
      border-color: #007bff;
      background-color: #bbdcff;
      color: black;
    }
    .player-box.folded {
      opacity: 0.5;
      background-color: #f0f8ff;
      color: black;
    }
    .player-box .actions button {
      margin: 5px;
    }
    .player-box .actions button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #game-log p {
      white-space: pre-line;
    }
    .hand-actions {
      margin-top: 16px;
    }
    .hand-actions[hidden] {
      display: none;
    }
    .next-hand-button {
      border: 0;
      border-radius: 5px;
      background: #ffd45a;
      color: #111;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 12px 18px;
    }
    .log-panel {
      margin-top: 18px;
      max-width: 760px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.28);
      color: #fff;
    }
    .log-panel summary {
      cursor: pointer;
      font-weight: 700;
      padding: 10px 12px;
    }
    .log-entries {
      max-height: 220px;
      overflow-y: auto;
      padding: 0 12px 12px;
    }
    .showdown-panel {
      margin-top: 20px;
      padding: 16px;
      border: 2px solid #f8d36a;
      border-radius: 6px;
      background: #fff8dc;
      color: #1f1f1f;
    }
    .showdown-panel[hidden] {
      display: none;
    }
    .pot-card {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #d0b45f;
      border-radius: 5px;
      background: #fff;
    }
    .winner-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .winner-option {
      border: 1px solid #777;
      border-radius: 4px;
      background: #f7f7f7;
      color: #111;
      cursor: pointer;
      padding: 6px 10px;
    }
    .winner-option.selected {
      border-color: #0b6f3a;
      background: #bff0cf;
      font-weight: 700;
    }
    .winner-option:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
    .showdown-actions {
      margin-top: 14px;
    }

    /* 新增样式：始终可见的 header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 10px;
      z-index: 100;
    }
    header label {
      margin-right: 10px;
    }
    .sync-status {
      margin-left: 10px;
      font-size: 0.9em;
    }
    .sync-status.ok {
      color: #b8ffcc;
    }
    .sync-status.error {
      color: #ffb3b3;
    }
    .main-content {
      margin-top: 60px; /* 留出 header 的高度 */
    }
  </style>
</head>
<body>
  <!-- 在 <body> 顶部加上始终可见的 header -->
  <header>
    <label for="room-id">房间ID:</label>
    <input type="text" id="room-id" placeholder="请输入房间号" />
    <button id="manual-sync">手动同步</button>
    <span id="sync-status" class="sync-status">本地模式</span>
  </header>

  <div class="main-content">
    <!-- 原有 setup 和 game 区域 -->
    <div id="setup">
      <h1>德州扑克筹码管理工具</h1>
      <div id="player-names" class="player-inputs">
        <label for="initial-chips">初始筹码:</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="initial-chips" min="100" value="1000" />
        <label for="big-blind">大盲注:</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="big-blind" min="10" value="20" />
      </div>
      <button id="add-player">添加玩家</button>
      <button id="start-game" disabled>开始游戏</button>
    </div>
    <div id="game" style="display: none;">
      <h2>游戏中</h2>
      <div id="game-info">
        <p id="current-round">当前轮次: 翻牌前</p>
        <p id="pot-amount">奖池: 0</p>
      </div>
      <div id="hand-actions" class="hand-actions" hidden></div>
      <div id="player-boxes" class="player-boxes"></div>
      <div id="showdown-panel" class="showdown-panel" hidden></div>
      <details id="log-panel" class="log-panel">
        <summary id="log-summary">操作日志</summary>
        <div id="game-log" class="log-entries"></div>
      </details>
    </div>
  </div>

  <script type="module" src="./poker-game.js"></script>
</body>
</html>
