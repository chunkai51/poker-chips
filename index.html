<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>德州扑克筹码管理工具</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <label for="room-id">房间ID:</label>
    <input type="text" id="room-id" placeholder="请输入房间号" />
    <button id="manual-sync">手动同步</button>
    <span id="sync-status" class="sync-status">本地模式</span>
  </header>

  <div class="main-content">
    <div id="setup">
      <h1>德州扑克筹码管理工具</h1>
      <div id="player-names" class="player-inputs">
        <label for="initial-chips">初始筹码:</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="initial-chips" min="100" value="1000" />
        <label for="big-blind">大盲注:</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="big-blind" min="10" value="20" />
      </div>
      <button id="add-player">添加玩家</button>
      <button id="start-game" disabled>开始游戏</button>
    </div>
    <div id="game" style="display: none;">
      <h2>游戏中</h2>
      <div id="game-info">
        <p id="current-round">当前轮次: 翻牌前</p>
        <p id="pot-amount">奖池: 0</p>
      </div>
      <div id="hand-actions" class="hand-actions" hidden></div>
      <div id="player-boxes" class="player-boxes"></div>
      <div id="showdown-panel" class="showdown-panel" hidden></div>
      <details id="log-panel" class="log-panel">
        <summary id="log-summary">操作日志</summary>
        <div id="game-log" class="log-entries"></div>
      </details>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
